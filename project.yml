name: Haze

options:
  bundleIdPrefix: com.adrbn.haze
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false
  xcodeVersion: "26.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Local builds sign ad-hoc with no dev team; flip these for distribution.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "YES"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    ALWAYS_SEARCH_USER_PATHS: "NO"
    CLANG_ENABLE_OBJC_ARC: "YES"

targets:
  HazeKit:
    type: framework
    platform: macOS
    sources:
      - path: Sources/HazeKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.adrbn.haze.HazeKit
        PRODUCT_NAME: HazeKit
        DEFINES_MODULE: "YES"
        GENERATE_INFOPLIST_FILE: "YES"
        SKIP_INSTALL: "YES"
        MARKETING_VERSION: "0.1.0"
        DYLIB_INSTALL_NAME_BASE: "@rpath"

  Haze:
    type: application
    platform: macOS
    sources:
      - path: Sources/Haze
    dependencies:
      - target: HazeKit
        embed: true
        codeSign: true
      - target: HazeSaver
        link: false
        copy:
          destination: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.adrbn.haze.app
        PRODUCT_NAME: Haze
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_LSUIElement: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: Haze
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Haze contributors — GPL-3.0"
        ENABLE_HARDENED_RUNTIME: "YES"
        COMBINE_HIDPI_IMAGES: "YES"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"

  HazeSaver:
    type: bundle
    platform: macOS
    sources:
      - path: Sources/HazeSaver
    dependencies:
      - target: HazeKit
        embed: true
        codeSign: true
      - sdk: ScreenSaver.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.adrbn.haze.saver
        PRODUCT_NAME: HazeSaver
        PRODUCT_MODULE_NAME: HazeSaver
        WRAPPER_EXTENSION: saver
        SKIP_INSTALL: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: Sources/HazeSaver/Info.plist
        ENABLE_HARDENED_RUNTIME: "YES"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @loader_path/../Frameworks @executable_path/../Frameworks"

  HazeKitTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/HazeKitTests
    dependencies:
      - target: HazeKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.adrbn.haze.HazeKitTests
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  Haze:
    build:
      targets:
        Haze: all
        HazeSaver: all
        HazeKitTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - HazeKitTests
