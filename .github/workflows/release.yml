name: Release

# Build Haze and publish a GitHub Release with three assets:
#   - Haze.dmg       drag-install for first-time users
#   - Haze.zip       the Sparkle update archive
#   - appcast.xml    the signed Sparkle feed
#
# The app's SUFeedURL is https://github.com/adrbn/haze/releases/latest/download/appcast.xml,
# so installed copies see the new version, show the changelog, and self-update
# in place ("Check for Updates…" or automatically once a day).
#
# Versioning: MARKETING_VERSION comes from the tag (v0.1.0 -> 0.1.0) and
# CFBundleVersion from the commit count (monotonic), so Sparkle always sees a
# higher build number than what's installed.
#
# Requires repo secret SPARKLE_ED_PRIVATE_KEY — the EdDSA private key whose
# public half is SUPublicEDKey in Info.plist. That signature, not Apple's, is
# what authenticates an update, so ad-hoc builds update safely.
#
# NOTE: still signed ad-hoc (no Apple Developer ID). First-time installs from the
# DMG hit Gatekeeper (right-click -> Open, or `xattr -cr /Applications/Haze.app`).
# Sparkle updates of an already-trusted copy are clean. Add Developer ID +
# notarization later for a clean first install too.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  SPARKLE_TOOLS_VERSION: "2.9.3"

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history -> commit-count build number + changelog

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Ensure Metal toolchain
        run: xcodebuild -downloadComponent MetalToolchain -quiet || true

      - name: Compute version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            SHORT="${GITHUB_REF_NAME#v}"
          else
            SHORT="0.0.0"
          fi
          echo "short=$SHORT" >> "$GITHUB_OUTPUT"
          echo "build=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"
          echo "Building Haze $SHORT (build $(git rev-list --count HEAD))"

      - name: Generate project
        run: xcodegen generate

      - name: Build (Release)
        run: |
          set -o pipefail
          xcodebuild -project Haze.xcodeproj -scheme Haze \
            -configuration Release -derivedDataPath build \
            MARKETING_VERSION="${{ steps.ver.outputs.short }}" \
            CURRENT_PROJECT_VERSION="${{ steps.ver.outputs.build }}" \
            CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=YES \
            build

      - name: Package DMG
        run: |
          APP="build/Build/Products/Release/Haze.app"
          codesign --force --deep --sign - "$APP"
          STAGE="$(mktemp -d)/dmg"
          mkdir -p "$STAGE"
          cp -R "$APP" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "Haze" -srcfolder "$STAGE" -ov -format UDZO Haze.dmg
          echo "Built $(du -h Haze.dmg | cut -f1) DMG"

      - name: Build Sparkle zip + signed appcast
        if: startsWith(github.ref, 'refs/tags/')
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          APP="build/Build/Products/Release/Haze.app"
          TAG="${GITHUB_REF_NAME}"

          # Sparkle-friendly zip (preserves symlinks + resource forks).
          ditto -c -k --sequesterRsrc --keepParent "$APP" Haze.zip

          # Sparkle CLI tools (pinned).
          curl -fsSL -o sparkle.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_TOOLS_VERSION}/Sparkle-${SPARKLE_TOOLS_VERSION}.tar.xz"
          mkdir -p sparkle && tar -xJf sparkle.tar.xz -C sparkle

          # Changelog: commit subjects since the previous tag.
          PREV="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
          RANGE="${PREV:+$PREV..}${TAG}"
          git log --no-merges --pretty='%s' $RANGE > notes.txt || true

          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > ed_private_key
          python3 scripts/make_appcast.py \
            --sign-update sparkle/bin/sign_update \
            --key-file ed_private_key \
            --zip Haze.zip \
            --short "${{ steps.ver.outputs.short }}" \
            --build "${{ steps.ver.outputs.build }}" \
            --url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/Haze.zip" \
            --pubdate "$(date -u '+%a, %d %b %Y %H:%M:%S +0000')" \
            --notes-file notes.txt \
            --out appcast.xml
          rm -f ed_private_key
          echo "=== appcast.xml ===" && cat appcast.xml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Haze-dmg
          path: Haze.dmg

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Haze.dmg
            Haze.zip
            appcast.xml
          generate_release_notes: true
