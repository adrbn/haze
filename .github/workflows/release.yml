name: Build DMG

# Build Haze and package a .dmg. Pushing a tag like `v0.1.0` also creates a
# GitHub Release with the DMG attached. You can also run it manually
# (Actions → Build DMG → Run workflow), which uploads the DMG as an artifact.
#
# NOTE: the build is signed ad-hoc (no Apple Developer ID), so on another Mac
# Gatekeeper will quarantine it ("damaged / unidentified developer"). Open it
# with right-click → Open, or `xattr -cr /Applications/Haze.app`. For a clean
# install on other machines, add Developer ID signing + notarization later
# (store the cert + App Store Connect API key as repo secrets).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Ensure Metal toolchain
        run: xcodebuild -downloadComponent MetalToolchain -quiet || true

      - name: Generate project
        run: xcodegen generate

      - name: Build (Release)
        run: |
          set -o pipefail
          xcodebuild -project Haze.xcodeproj -scheme Haze \
            -configuration Release -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=YES \
            build

      - name: Package DMG
        run: |
          APP="build/Build/Products/Release/Haze.app"
          codesign --force --deep --sign - "$APP"
          STAGE="$(mktemp -d)/dmg"
          mkdir -p "$STAGE"
          cp -R "$APP" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "Haze" -srcfolder "$STAGE" -ov -format UDZO Haze.dmg
          echo "Built $(du -h Haze.dmg | cut -f1) DMG"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Haze-dmg
          path: Haze.dmg

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Haze.dmg
          generate_release_notes: true
